services:

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      WORKER_PUBLIC_URL: "http://worker:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  planner:
    build:
      context: .
      dockerfile: planner/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      WORKER_URL: "http://worker:8001"
      PLANNER_PUBLIC_URL: "http://planner:8000"
    depends_on:
      worker:
        condition: service_healthy

  langgraph-studio:
    build:
      context: .
      dockerfile: Dockerfile.langgraph
    ports:
      - "2024:8000"
    env_file: .env
    environment:
      REDIS_URI: "redis://langgraph-redis:6379"
      DATABASE_URI: "postgres://postgres:postgres@langgraph-postgres:5432/postgres"
      WORKER_URL: "http://worker:8001"
    depends_on:
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_healthy
      worker:
        condition: service_healthy

  langgraph-redis:
    image: redis:6
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  langgraph-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - langgraph-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  langgraph-data:
