models:

  gemini_flash:
    provider: gemini
    model_id: gemini-1.5-flash
    temperature: 0.1
    max_tokens: 1024
    api_keys:
      - "${GEMINI_API_KEY}"
      - "${GEMINI_API_KEY_2}"

  groq_llama:
    provider: groq
    model_id: llama-3.1-8b-instant
    temperature: 0.1
    max_tokens: 1024
    api_keys:
      - "${GROQ_API_KEY}"
      - "${GROQ_API_KEY_2}"

  openrouter_free:
    provider: openrouter
    model_id: meta-llama/llama-3.1-8b-instruct:free
    temperature: 0.1
    max_tokens: 1024
    api_keys:
      - "${OPENROUTER_API_KEY}"

  ollama_local:
    provider: ollama
    model_id: llama3.1
    temperature: 0.1
    max_tokens: 1024
    api_keys:
      - "ollama"

agents:

  planner:
    name: "Planner Agent"
    description: "Receives user questions and delegates to Worker agents via A2A"
    port: 8000
    public_url: "${PLANNER_PUBLIC_URL:http://localhost:8000}"

    model_chain:
      - gemini_flash
      - groq_llama
      - openrouter_free

    flow:
      entry: receive_question
      nodes:
        - id: receive_question
          type: passthrough

        - id: delegate_to_worker
          type: a2a_delegate
          config:
            target_agent: worker
            streaming: true

        - id: return_answer
          type: passthrough
      edges:
        - [receive_question, delegate_to_worker]
        - [delegate_to_worker, return_answer]

    tools: []

    skills:
      - id: plan-and-answer
        name: "Plan and Answer"
        description: "Delegates questions to the right Worker agent"
        input_modes: [text]
        output_modes: [text]

  worker:
    name: "Worker Agent"
    description: "Answers questions using a configurable AI model"
    port: 8001
    public_url: "${WORKER_PUBLIC_URL:http://localhost:8001}"

    model_chain:
      - gemini_flash
      - groq_llama
      - openrouter_free

    flow:
      entry: receive_task
      nodes:
        - id: receive_task
          type: passthrough

        - id: call_ai
          type: llm_call
          config:
            prompt_id: worker_default
            system_prompt: "You are a helpful assistant. Answer clearly and concisely."
            use_tools: true

        - id: format_response
          type: passthrough
      edges:
        - [receive_task, call_ai]
        - [call_ai, format_response]

    tools:
      - name: calculator
        enabled: false
        description: "Evaluate arithmetic expressions (e.g. 2 + 2 * 3)"

      - name: web_search
        enabled: false
        description: "Search the web for current information"

    skills:
      - id: answer-question
        name: "Answer Question"
        description: "Answers any natural-language question"
        input_modes: [text]
        output_modes: [text]

agent_endpoints:
  worker:
    url: "${WORKER_URL:http://localhost:8001}"

auth:
  enabled: true
  tokens:
    planner: "${PLANNER_TOKEN:planner-dev-token}"
    worker: "${WORKER_TOKEN:worker-dev-token}"

streaming:
  enabled: true

providers:

  groq:
    base_url: "https://api.groq.com/openai/v1"

  gemini:
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"

  openrouter:
    base_url: "https://openrouter.ai/api/v1"

  ollama:
    base_url: "${OLLAMA_URL:http://localhost:11434}/v1"
